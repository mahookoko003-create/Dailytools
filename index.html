<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Daily Tools</title>

  <style>

    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    .header{
      padding:20px;
      text-align:center;
      font-size:30px;
      font-weight:bold;
    }

    .container{
      padding:20px;
      display:grid;
      grid-template-columns:1fr;
      gap:20px;
    }

    .card{
      background:#1e293b;
      padding:20px;
      border-radius:20px;
    }

    .card h2{
      margin-top:0;
    }

    .btn{
      background:#3b82f6;
      color:white;
      border:none;
      padding:10px 20px;
      border-radius:10px;
      font-size:16px;
    }

  </style>
</head>

<body>

  <div class="header">
    🚀 Daily Tools
  </div>

  <div class="container">

    <div class="card">
      <h2>QR Code Tool</h2>
      <p>Yakında eklenecek.</p>
      <button class="btn">Kullan</button>
    </div>

    <div class="card">
      <h2>Password Generator</h2>
      <p>Yakında eklenecek.</p>
      <button class="btn">Kullan</button>
    </div>

    <div class="card">
      <h2>AI Bio Generator</h2>
      <p>Yakında eklenecek.</p>
      <button class="btn">Kullan</button>
    </div>

  </div>

</body>
</html>
